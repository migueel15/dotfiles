background {
    path = screenshot # ~/.cache/hyprlock_wall.png
    blur_passes = 4
    blur_size = 6
    contrast = 1.4
    noise = 0.02
    brightness = 0.7
    vibrancy = 0.6
}

general { }

input-field {
    size = 200, 35
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(250, 250, 250, 0.3)
    inner_color = rgba(250, 250, 250, 0.2)
    font_color = rgb(250, 250, 250)
    fade_on_empty = false
    font_family = Google Sans Flex Medium
    placeholder_text = Enter password... 
    fail_text = $PAMFAIL
    hide_input = false
    position = 0, -360
    halign = center
    valign = center
}

label {
    text = ───
    color = rgb(fafafa)
    font_size = 60
    font_family = Google Sans Flex
    position = 0, 60
    halign = center
    valign = center
}

label {
    text = $TIME
    color = rgba(250,250,250,0.8)
    font_size = 220
    font_family = Google Sans Flex Bold
    position = 0, 220
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%A")"
    color = rgba(255,131,44,1.0)
    font_size = 60
    font_family = Betterlett Bold
    position = 0,220
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%d %B %Y")"
    color = rgba(250,250,250,1.0)
    font_size = 34
    font_family = Google Sans Flex Bold
    position = 0,-10
    halign = center
    valign = center
}

image {
    path = ~/.config/Resources/images/PFP.jpg
    color = rgba(250, 250, 250, 1.0)
    border_size = 2
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -180
    halign = center
    valign = center
}

label {
    text = Hello, $USER
    color = rgba(250, 250, 250, 1.0)
    font_size = 30
    font_family = Google Sans Flex Medium
    position = 0, -280
    halign = center
    valign = center
}
